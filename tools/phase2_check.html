<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Phase 2 前処理パイプライン照合</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 1rem; line-height: 1.5; }
    .ok { color: #059669; } .ng { color: #dc2626; } .info { color: #2563eb; }
    pre { background:#f1f5f9; padding:.5rem 1rem; border-radius:6px; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h1>Phase 2: 前処理パイプラインの Python 照合（生JPG→認識まで端点間）</h1>
  <p>生スキャンJPGを入力に、JS の detectMarkers→transformImage→(Phase1) を実行し、
     マーカー座標・台形補正画像・最終予測を Python 正解と照合します。</p>
  <pre id="out">初期化中...</pre>

  <script>window.Module = { onRuntimeInitialized() { window.__CV_READY__ = true; } };</script>
  <script async src="../public/assets/vendor/opencv.js"></script>
  <script src="../public/assets/vendor/tf.min.js"></script>

  <script type="module">
    import { loadConfig, parseRoiCsv } from "../src/config.js";
    import { extractRois, deleteRois } from "../src/extractor.js";
    import { predictNumbers } from "../src/predictor.js";
    import { initBackend } from "../src/backend.js";
    import { detectMarkers } from "../src/markerDetector.js";
    import { transformImage } from "../src/geometry.js";

    const SAMPLES = ["0101","0102","0103","0104","0105","0201","0202","0301","0302","0303",
                     "0304","0305","0306","0401","0402","0403","0404","0405","0501","0502"];
    const ASSETS = "../public/assets/";
    const outEl = document.getElementById("out");
    function log(msg, cls) {
      const s = document.createElement("span");
      if (cls) s.className = cls;
      s.textContent = msg + "\n";
      outEl.appendChild(s);
      console.log("[phase2] " + msg);
    }
    async function waitCv() {
      const t0 = Date.now();
      while (!window.__CV_READY__ || typeof window.tf === "undefined") {
        if (Date.now() - t0 > 30000) throw new Error("cv/tf 初期化タイムアウト");
        await new Promise((r) => setTimeout(r, 200));
      }
    }
    async function loadMat(url) {
      const img = new Image();
      img.src = url;
      await img.decode();
      const c = document.createElement("canvas");
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext("2d").drawImage(img, 0, 0);
      return cv.imread(c);
    }
    function grayMaxDiff(a, b) {
      // a,b: RGBA Mat 同サイズ。グレースケール化して最大画素差と差分画素数
      const ga = new cv.Mat(), gb = new cv.Mat();
      cv.cvtColor(a, ga, cv.COLOR_RGBA2GRAY);
      cv.cvtColor(b, gb, cv.COLOR_RGBA2GRAY);
      let maxD = 0, ndiff = 0;
      const da = ga.data, db = gb.data;
      for (let i = 0; i < da.length; i++) {
        const d = Math.abs(da[i] - db[i]);
        if (d > 0) ndiff++;
        if (d > maxD) maxD = d;
      }
      ga.delete(); gb.delete();
      return { maxD, ndiff, total: da.length };
    }

    async function run() {
      outEl.textContent = "";
      await waitCv();
      const backend = await initBackend();
      log("準備完了 tfjs backend=" + backend, "info");
      const model = await tf.loadLayersModel(ASSETS + "model/model.json");
      const cfg = await loadConfig(ASSETS);
      const roiRows = parseRoiCsv(await (await fetch(ASSETS + "ROI_coordinate.csv")).text());

      let tested = 0, skipped = 0;
      let coordMaxErr = 0, markerFail = 0, predMismatch = 0;
      let imgMaxDiffWorst = 0, imgDiffPxWorst = 0;

      for (const stem of SAMPLES) {
        const refResp = await fetch("testdata/" + stem + "_reference.json");
        if (!refResp.ok) { skipped++; continue; }
        tested++;
        const ref = await refResp.json();
        log("\n=== " + stem + " ===");

        const src = await loadMat("testdata/" + stem + "_raw.jpg");

        // (A) マーカー検出
        const coords = detectMarkers(src);
        if (!coords) {
          markerFail++;
          log("  [marker NG] JS で検出失敗（Python は成功）", "ng");
          src.delete();
          continue;
        }
        // 座標照合（順序 TL,TR,BR,BL）
        let cErr = 0;
        for (let k = 0; k < 4; k++) {
          cErr = Math.max(cErr, Math.abs(coords[k][0] - ref.coords[k][0]),
                                Math.abs(coords[k][1] - ref.coords[k][1]));
        }
        coordMaxErr = Math.max(coordMaxErr, cErr);

        // (B) 台形補正
        const tMat = transformImage(src, coords);

        // 台形補正画像を Python の PNG と比較
        const refT = await loadMat("testdata/" + stem + "_transformed.png");
        const d = grayMaxDiff(tMat, refT);
        refT.delete();
        imgMaxDiffWorst = Math.max(imgMaxDiffWorst, d.maxD);
        imgDiffPxWorst = Math.max(imgDiffPxWorst, d.ndiff);

        // (C) 認識（Phase 1）
        const rois = extractRois(tMat, roiRows);
        const preds = await predictNumbers(rois, model, cfg);
        deleteRois(rois);
        tMat.delete();
        src.delete();

        // 予測照合
        let mism = 0;
        const keys = new Set([...Object.keys(ref.predictions), ...Object.keys(preds)]);
        for (const kk of keys) {
          if (kk.endsWith("_confidence") || kk.endsWith("_low_confidence_flag")) continue;
          if (String(preds[kk] ?? "") !== String(ref.predictions[kk] ?? "")) {
            mism++; predMismatch++;
            log(`  [pred NG] ${kk}: js='${preds[kk] ?? ""}' ref='${ref.predictions[kk] ?? ""}'`, "ng");
          }
        }
        log(`  座標最大誤差=${cErr}px  補正画像maxΔ=${d.maxD}(差分px ${d.ndiff}/${d.total})  予測不一致=${mism}`,
            cErr === 0 && mism === 0 ? "ok" : (mism === 0 ? "info" : "ng"));
      }

      log("\n---------- 総合結果 ----------");
      log(`対象 ${tested} 枚 / スキップ ${skipped} 枚`, "info");
      log(`マーカー検出失敗(JS): ${markerFail} 枚`, markerFail === 0 ? "ok" : "ng");
      log(`座標 最大誤差: ${coordMaxErr} px`, coordMaxErr <= 1 ? "ok" : "ng");
      log(`台形補正画像 最悪 maxΔ=${imgMaxDiffWorst}, 最悪差分px=${imgDiffPxWorst}`,
          imgMaxDiffWorst <= 2 ? "ok" : "info");
      log(`予測 不一致: ${predMismatch} 件`, predMismatch === 0 ? "ok" : "ng");
      const pass = markerFail === 0 && coordMaxErr <= 1 && predMismatch === 0;
      log(pass ? "\n✓ Python と一致（Phase 2 合格・端点間）" : "\n✗ 差分あり（要確認）",
          pass ? "ok" : "ng");
      window.__PHASE2_PASS__ = pass;
      window.__PHASE2_SUMMARY__ = { tested, skipped, markerFail, coordMaxErr, imgMaxDiffWorst, imgDiffPxWorst, predMismatch };
    }
    run().catch((e) => { log("エラー: " + e.stack, "ng"); window.__PHASE2_PASS__ = false; });
  </script>
</body>
</html>
