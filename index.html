<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>グッズ交換票・AI読み取り</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="apple-touch-icon" href="public/assets/icon.png" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <header>
    <h1>グッズ交換票・AI読み取り</h1>
    <p class="sub">交換票PDF / 画像から数値を自動読み取り、検算・訂正してCSVを出力します（オフライン・端末内処理）</p>
  </header>

  <main>
    <section id="dropzone" class="dropzone">
      <p class="dz-title">PDF または 画像をドラッグ＆ドロップ</p>
      <p class="dz-or">または</p>
      <label class="btn">
        ファイルを選択
        <input id="fileInput" type="file" accept="application/pdf,image/*" multiple disabled hidden />
      </label>
      <p id="status" class="status">読み込み中…</p>
    </section>

    <div id="progressWrap" class="progress-wrap" hidden>
      <div id="progressBar" class="progress-bar"></div>
    </div>

    <section id="results" class="results" hidden>
      <div class="results-head">
        <div id="summary" class="summary"></div>
        <div class="dl">
          <label>年月 <input id="ymInput" type="text" placeholder="202606" size="8" /></label>
          <button id="downloadBtn" class="btn" disabled>CSV ダウンロード</button>
          <button id="downloadAggBtn" class="btn" disabled>日別集計CSV ダウンロード</button>
        </div>
      </div>
      <table class="result-table">
        <thead>
          <tr><th>ページ</th><th>日付</th><th>認識結果</th><th>状態</th><th></th></tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </section>
  </main>

  <!-- ライブラリ（ローカル同梱・オフライン動作） -->
  <script>window.Module = { onRuntimeInitialized() { window.__CV_READY__ = true; } };</script>
  <script async src="public/assets/vendor/opencv.js"></script>
  <script src="public/assets/vendor/tf.min.js"></script>
  <script src="public/assets/vendor/pdf.min.js"></script>
  <script type="module" src="src/main.js"></script>
  <script>
    // Service Worker 登録（オフライン動作の有効化）。?nosw で無効化（開発用）。
    if ("serviceWorker" in navigator && !location.search.includes("nosw")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW登録失敗:", e));
      });
    }
  </script>
</body>
</html>
